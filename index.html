<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon News</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="darktheme">
    <header class="fixed">
        <div class="container">
            <nav class="nav-bar">
                <div class="nav-logo" onclick="reload()">
                    <img src="asset\logo.png" alt="Sakura News">
                </div>
                <div class="nav-list">
                    <li class="list-itms"><a href="#" onclick="latest()" class="nav-anc">Latest</a></li>
                    <li class="list-itms"><a href="#" onclick="trending()" class="nav-anc">Trending</a></li>
                    <li class="list-itms"><a href="#" onclick="sports()" class="nav-anc">Sports</a></li>
                    <li class="list-itms"><a href="#" onclick="technology()" class="nav-anc">Technology</a></li>
                    <li class="list-itms"><a href="#" onclick="food()" class="nav-anc">Food</a></li>
                    <div class="search-icon" id="searchicon"><i class="fa-solid fa-magnifying-glass icon"></i></div>
                    <div class="themediv">
                        <i id="moon" class="fa-solid fa-moon icon"></i>
                        <i id="sun" class="fa-solid fa-sun icon"></i>
                    </div>
                </div>
            </nav>
        </div>
        <div class="search-form" id="sercontainer">
            <form action="#" id="seform">
                <div class="serinpdiv"><input type="text" id="serinp" placeholder="Eg : Football, Anime, etc." autocomplete="off"></div>
                <button type="submit" class="serbtn">Search</button>
            </form>
        </div>
    </header>
    <main>
        <div class="container2" >
            <div class="news-ticker" >
                <div class="ticker-content">

                </div>
            </div>
            <div class="card-container">

            </div>

            <div class="load-flex">
                <button class="btn" id="loadMore">Load More</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
